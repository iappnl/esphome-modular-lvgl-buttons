---
# Color picker popup — LVGL v9.5 has no colorwheel widget, so we
# reproduce the v8 look with two modes:
#
#   HSV mode (default):
#     - Rainbow hue ring image (SVG → PNG at compile time)
#     - Transparent draggable arc on top to read hue 0-360
#     - Inner saturation arc
#
#   Kelvin mode:
#     - Blackbody color-temperature ring image (1000-8000 K)
#     - Transparent draggable arc to read K
#
# Both modes share the center swatch + label + Close button. A toggle
# button in the top-right switches between them.
#
# To open from a button:
#   - lvgl.widget.show: popup_scrim
#   - lvgl.widget.show: popup_color

globals:
  # false = HSV mode, true = Kelvin (color-temperature) mode
  - id: color_mode_kelvin
    type: bool
    restore_value: false
    initial_value: 'false'

image:
  rgb565:
    alpha_channel:
      - file: 'esphome-modular-lvgl-buttons/assets/images/hue_ring.svg'
        id: hue_ring_img
        # ESPHome rasterizes the SVG via resvg_py at compile time to this size.
        # Bump both numbers (and the matching arc widths below) to render
        # at higher resolution.
        resize: 300x300
      - file: 'esphome-modular-lvgl-buttons/assets/images/kelvin_ring.svg'
        id: kelvin_ring_img
        resize: 300x300

script:
  - id: !extend popup_close
    then:
      - lvgl.widget.hide: popup_color

  # Recompute swatch + readout from whichever arc is active
  - id: color_picker_update
    then:
      - lambda: |-
          if (id(color_mode_kelvin)) {
            uint16_t k = (uint16_t) lv_arc_get_value(id(color_kelvin_arc));
            // Tanner Helland kelvin -> RGB approximation
            float t = k / 100.0f;
            float r, g, b;
            if (t <= 66.0f) {
              r = 255.0f;
              g = 99.4708025861f * logf(t) - 161.1195681661f;
              b = (t <= 19.0f)
                    ? 0.0f
                    : 138.5177312231f * logf(t - 10.0f) - 305.0447927307f;
            } else {
              r = 329.698727446f * powf(t - 60.0f, -0.1332047592f);
              g = 288.1221695283f * powf(t - 60.0f, -0.0755148492f);
              b = 255.0f;
            }
            auto cl = [](float v) -> uint8_t {
              return (uint8_t)(v < 0 ? 0 : (v > 255 ? 255 : v));
            };
            lv_color_t c = lv_color_make(cl(r), cl(g), cl(b));
            lv_obj_set_style_bg_color(id(color_swatch), c, LV_PART_MAIN);
            char buf[32];
            snprintf(buf, sizeof(buf), "%uK", k);
            lv_label_set_text(id(color_hsv_label), buf);
          } else {
            uint16_t h = (uint16_t) lv_arc_get_value(id(color_hue_arc));
            uint8_t  s = (uint8_t)  lv_arc_get_value(id(color_sat_arc));
            lv_color_t c = lv_color_hsv_to_rgb(h, s, 100);
            lv_obj_set_style_bg_color(id(color_swatch), c, LV_PART_MAIN);
            char buf[32];
            snprintf(buf, sizeof(buf), "H:%u  S:%u", h, s);
            lv_label_set_text(id(color_hsv_label), buf);
          }

  # Flip mode + show/hide the right set of widgets, then refresh swatch.
  - id: color_mode_toggle
    then:
      - lambda: 'id(color_mode_kelvin) = !id(color_mode_kelvin);'
      - if:
          condition:
            lambda: 'return id(color_mode_kelvin);'
          then:
            - lvgl.widget.hide: color_hue_ring_image
            - lvgl.widget.hide: color_hue_arc
            - lvgl.widget.hide: color_sat_arc
            - lvgl.widget.show: color_kelvin_ring_image
            - lvgl.widget.show: color_kelvin_arc
            - lvgl.label.update:
                id: color_mode_toggle_label
                text: "HSV"
          else:
            - lvgl.widget.show: color_hue_ring_image
            - lvgl.widget.show: color_hue_arc
            - lvgl.widget.show: color_sat_arc
            - lvgl.widget.hide: color_kelvin_ring_image
            - lvgl.widget.hide: color_kelvin_arc
            - lvgl.label.update:
                id: color_mode_toggle_label
                text: "K"
      - script.execute: color_picker_update

lvgl:
  top_layer:
    widgets:
      - obj:
          id: popup_color
          hidden: true
          align: CENTER
          width: 95%
          height: 95%
          radius: 12
          bg_color: $bg_color
          bg_opa: COVER
          border_width: 2
          border_color: ep_orange
          pad_all: 12
          clickable: true
          widgets:
            - label:
                align: top_left
                x: 4
                y: 4
                text_font: nunito_20
                text_color: ep_orange
                text: "Color Picker"

            # Mode toggle (bottom-left). Label shows what you'd switch TO.
            - button:
                align: bottom_left
                x: 4
                y: -10
                radius: 12
                width: 60
                height: 36
                widgets:
                  - label:
                      id: color_mode_toggle_label
                      align: center
                      text_color: white
                      text: "K"
                on_short_click:
                  - script.execute: color_mode_toggle

            # ---- HSV mode widgets ----

            # Rainbow hue ring — purely visual (no input)
            - image:
                id: color_hue_ring_image
                src: hue_ring_img
                align: center
                y: -10

            # Transparent draggable arc overlaid on the hue ring.
            - arc:
                id: color_hue_arc
                align: center
                y: -10
                width: 380
                height: 380
                adjustable: true
                adv_hittest: true
                min_value: 0
                max_value: 360
                value: 0
                start_angle: 0
                end_angle: 360
                rotation: 270
                arc_width: 46
                arc_opa: transp
                indicator:
                  arc_opa: transp
                knob:
                  pad_all: 4
                  bg_opa: transp
                  border_width: 4
                  border_color: white
                  shadow_opa: transp
                on_value:
                  - script.execute: color_picker_update

            # Inner saturation arc (HSV only)
            - arc:
                id: color_sat_arc
                align: center
                y: -10
                width: 240
                height: 240
                adjustable: true
                adv_hittest: true
                min_value: 0
                max_value: 100
                value: 100
                start_angle: 0
                end_angle: 360
                rotation: 270
                arc_width: 18
                arc_color: very_dark_gray
                indicator:
                  arc_width: 18
                  arc_color: steel_blue
                knob:
                  bg_color: white
                  border_width: 2
                  border_color: steel_blue
                on_value:
                  - script.execute: color_picker_update

            # ---- Kelvin mode widgets (hidden by default) ----

            - image:
                id: color_kelvin_ring_image
                hidden: true
                src: kelvin_ring_img
                align: center
                y: -10

            - arc:
                id: color_kelvin_arc
                hidden: true
                align: center
                y: -10
                width: 380
                height: 380
                adjustable: true
                adv_hittest: true
                min_value: 1000
                max_value: 8000
                value: 4000
                start_angle: 0
                end_angle: 360
                rotation: 270
                arc_width: 46
                arc_opa: transp
                indicator:
                  arc_opa: transp
                knob:
                  pad_all: 4
                  bg_opa: transp
                  border_width: 4
                  border_color: white
                  shadow_opa: transp
                on_value:
                  - script.execute: color_picker_update

            # ---- Shared center / footer ----

            - obj:
                id: color_swatch
                align: center
                y: -10
                width: 110
                height: 110
                radius: 55
                border_width: 2
                border_color: white
                bg_color: 0xFF0000
                bg_opa: COVER

            - label:
                id: color_hsv_label
                align: top_right
                x: -4
                y: 4
                text_font: nunito_20
                text_color: white
                text: "H:0  S:100"

            - button:
                align: bottom_right
                radius: 15
                width: 100
                height: 50
                widgets:
                  - label:
                      text_color: white
                      align: center
                      text: "Close"
                on_short_click:
                  - script.execute: popup_close
