---
# Voice Assistant full-screen page
# Three concentric circles simulate a radial gradient (dark edge → bright centre).
# A transparent button overlay handles taps and shows the mic icon.
# Designed for use with hardware/media_player-voice_assistant.yaml.

globals:
  - id: va_is_pulsing
    type: bool
    initial_value: 'false'

script:
  - id: va_pulse_script
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return id(va_is_pulsing);'
          then:
            - lambda: |-
                int s = 190 + (rand() % 60);    // outer 190–250px
                int m = s * 65 / 100;            // mid  ~65%
                int i = s * 35 / 100;            // inner ~35%
                int glow = 15 + (rand() % 35);   // shadow 15–50px
                lv_obj_set_width(id(va_sphere_outer),  s); lv_obj_set_height(id(va_sphere_outer),  s); lv_obj_set_style_radius(id(va_sphere_outer),  s/2, 0); lv_obj_align(id(va_sphere_outer),  LV_ALIGN_CENTER, 0, 0);
                lv_obj_set_width(id(va_sphere_mid),    m); lv_obj_set_height(id(va_sphere_mid),    m); lv_obj_set_style_radius(id(va_sphere_mid),    m/2, 0); lv_obj_align(id(va_sphere_mid),    LV_ALIGN_CENTER, 0, 0);
                lv_obj_set_width(id(va_sphere_inner),  i); lv_obj_set_height(id(va_sphere_inner),  i); lv_obj_set_style_radius(id(va_sphere_inner),  i/2, 0); lv_obj_align(id(va_sphere_inner),  LV_ALIGN_CENTER, 0, 0);
                lv_obj_set_width(id(va_mic_button),    s); lv_obj_set_height(id(va_mic_button),    s); lv_obj_set_style_radius(id(va_mic_button),    s/2, 0); lv_obj_align(id(va_mic_button),    LV_ALIGN_CENTER, 0, 0);
                lv_obj_set_style_shadow_width(id(va_sphere_outer), glow, 0);
            - delay: !lambda 'return 20 + (rand() % 80);'
      # Restore original size when pulsing stops
      - lambda: |-
          lv_obj_set_width(id(va_sphere_outer), 220); lv_obj_set_height(id(va_sphere_outer), 220); lv_obj_set_style_radius(id(va_sphere_outer), 110, 0); lv_obj_align(id(va_sphere_outer), LV_ALIGN_CENTER, 0, 0); lv_obj_set_style_shadow_width(id(va_sphere_outer), 15, 0);
          lv_obj_set_width(id(va_sphere_mid),   143); lv_obj_set_height(id(va_sphere_mid),   143); lv_obj_set_style_radius(id(va_sphere_mid),    71, 0); lv_obj_align(id(va_sphere_mid),   LV_ALIGN_CENTER, 0, 0);
          lv_obj_set_width(id(va_sphere_inner),  77); lv_obj_set_height(id(va_sphere_inner),  77); lv_obj_set_style_radius(id(va_sphere_inner),  38, 0); lv_obj_align(id(va_sphere_inner), LV_ALIGN_CENTER, 0, 0);
          lv_obj_set_width(id(va_mic_button),   220); lv_obj_set_height(id(va_mic_button),   220); lv_obj_set_style_radius(id(va_mic_button),   110, 0); lv_obj_align(id(va_mic_button),   LV_ALIGN_CENTER, 0, 0);

lvgl:
  pages:
    - id: main_page
      bg_color: black
      widgets:
        # --- Radial gradient sphere: 3 concentric circles ---
        # Outer ring (darkest)
        - obj:
            id: va_sphere_outer
            align: CENTER
            y: 0
            width: 220
            height: 220
            radius: 110
            bg_color: 0x1E1E1E
            shadow_color: gray
            shadow_width: 15
            shadow_opa: 80%
            shadow_spread: 8
            border_opa: transp
            clickable: false

        # Mid ring
        - obj:
            id: va_sphere_mid
            align: CENTER
            y: 0
            width: 143
            height: 143
            radius: 71
            bg_color: 0x333333
            border_opa: transp
            clickable: false

        # Inner bright centre
        - obj:
            id: va_sphere_inner
            align: CENTER
            y: 0
            width: 77
            height: 77
            radius: 38
            bg_color: 0x555555
            border_opa: transp
            clickable: false

        # Transparent overlay — tap target + mic icon
        - button:
            id: va_mic_button
            align: CENTER
            y: 0
            width: 220
            height: 220
            radius: 110
            bg_opa: transp
            shadow_opa: transp
            border_opa: transp
            pad_all: 0
            on_click:
              - if:
                  condition:
                    - voice_assistant.is_running:
                  then:
                    - voice_assistant.stop:
                  else:
                    - voice_assistant.start:
            widgets:
              - label:
                  id: va_mic_icon
                  align: CENTER
                  text: $mdi_microphone
                  text_font: $icon_font
                  text_color: white

        # Status label just below the sphere
        - label:
            id: va_status_label
            align: CENTER
            y: 160
            text: "Idle"
            text_font: $text_font
            text_color: white

        # Shown only when HA is disconnected
        - label:
            id: va_connection_label
            align: BOTTOM_MID
            y: -40
            text: "Not connected to Home Assistant"
            text_font: $text_font
            text_color: gray
            hidden: true

voice_assistant:
  on_listening:
    - lambda: |-
        id(va_is_pulsing) = false;
        // Restore size (in case pulsing was active)
        lv_obj_set_width(id(va_sphere_outer), 220); lv_obj_set_height(id(va_sphere_outer), 220); lv_obj_set_style_radius(id(va_sphere_outer), 110, 0); lv_obj_align(id(va_sphere_outer), LV_ALIGN_CENTER, 0, 0);
        lv_obj_set_width(id(va_sphere_mid),   143); lv_obj_set_height(id(va_sphere_mid),   143); lv_obj_set_style_radius(id(va_sphere_mid),    71, 0); lv_obj_align(id(va_sphere_mid),   LV_ALIGN_CENTER, 0, 0);
        lv_obj_set_width(id(va_sphere_inner),  77); lv_obj_set_height(id(va_sphere_inner),  77); lv_obj_set_style_radius(id(va_sphere_inner),  38, 0); lv_obj_align(id(va_sphere_inner), LV_ALIGN_CENTER, 0, 0);
        lv_obj_set_width(id(va_mic_button),   220); lv_obj_set_height(id(va_mic_button),   220); lv_obj_set_style_radius(id(va_mic_button),   110, 0); lv_obj_align(id(va_mic_button),   LV_ALIGN_CENTER, 0, 0);
        // Red: dark edge → bright centre
        lv_obj_set_style_bg_color(id(va_sphere_outer), lv_color_make(0x77, 0x00, 0x00), 0);
        lv_obj_set_style_bg_color(id(va_sphere_mid),   lv_color_make(0xBB, 0x22, 0x22), 0);
        lv_obj_set_style_bg_color(id(va_sphere_inner), lv_color_make(0xFF, 0x77, 0x77), 0);
        lv_obj_set_style_shadow_color(id(va_sphere_outer), lv_color_make(0xFF, 0x00, 0x00), 0);
        lv_obj_set_style_shadow_width(id(va_sphere_outer), 20, 0);
    - lvgl.label.update:
        id: va_status_label
        text: "Listening..."
  on_stt_vad_end:
    - lambda: |-
        // Blue: dark edge → bright centre
        lv_obj_set_style_bg_color(id(va_sphere_outer), lv_color_make(0x00, 0x22, 0x66), 0);
        lv_obj_set_style_bg_color(id(va_sphere_mid),   lv_color_make(0x22, 0x55, 0xBB), 0);
        lv_obj_set_style_bg_color(id(va_sphere_inner), lv_color_make(0x77, 0xAA, 0xFF), 0);
        lv_obj_set_style_shadow_color(id(va_sphere_outer), lv_color_make(0x00, 0x66, 0xFF), 0);
        id(va_is_pulsing) = true;
    - script.execute: va_pulse_script
    - lvgl.label.update:
        id: va_status_label
        text: "Thinking..."
  on_tts_start:
    - lambda: |-
        // Green: dark edge → bright centre
        lv_obj_set_style_bg_color(id(va_sphere_outer), lv_color_make(0x00, 0x33, 0x22), 0);
        lv_obj_set_style_bg_color(id(va_sphere_mid),   lv_color_make(0x1A, 0x88, 0x55), 0);
        lv_obj_set_style_bg_color(id(va_sphere_inner), lv_color_make(0x66, 0xEE, 0x99), 0);
        lv_obj_set_style_shadow_color(id(va_sphere_outer), lv_color_make(0x00, 0xCC, 0x55), 0);
        id(va_is_pulsing) = true;
    - script.execute: va_pulse_script
    - lvgl.label.update:
        id: va_status_label
        text: "Speaking..."
  on_end:
    - lambda: |-
        id(va_is_pulsing) = false;
        // Gray: dark edge → bright centre
        lv_obj_set_style_bg_color(id(va_sphere_outer), lv_color_make(0x1E, 0x1E, 0x1E), 0);
        lv_obj_set_style_bg_color(id(va_sphere_mid),   lv_color_make(0x33, 0x33, 0x33), 0);
        lv_obj_set_style_bg_color(id(va_sphere_inner), lv_color_make(0x55, 0x55, 0x55), 0);
        lv_obj_set_style_shadow_color(id(va_sphere_outer), lv_color_make(0x88, 0x88, 0x88), 0);
        lv_obj_set_style_shadow_width(id(va_sphere_outer), 15, 0);
    - lvgl.label.update:
        id: va_status_label
        text: "Idle"
  on_error:
    - lambda: |-
        id(va_is_pulsing) = false;
        // Orange: dark edge → bright centre
        lv_obj_set_style_bg_color(id(va_sphere_outer), lv_color_make(0x66, 0x33, 0x00), 0);
        lv_obj_set_style_bg_color(id(va_sphere_mid),   lv_color_make(0xBB, 0x66, 0x00), 0);
        lv_obj_set_style_bg_color(id(va_sphere_inner), lv_color_make(0xFF, 0xAA, 0x44), 0);
        lv_obj_set_style_shadow_color(id(va_sphere_outer), lv_color_make(0xFF, 0x88, 0x00), 0);
        lv_obj_set_style_shadow_width(id(va_sphere_outer), 20, 0);
    - lvgl.label.update:
        id: va_status_label
        text: "Error"
    - delay: 2s
    - lambda: |-
        lv_obj_set_style_bg_color(id(va_sphere_outer), lv_color_make(0x1E, 0x1E, 0x1E), 0);
        lv_obj_set_style_bg_color(id(va_sphere_mid),   lv_color_make(0x33, 0x33, 0x33), 0);
        lv_obj_set_style_bg_color(id(va_sphere_inner), lv_color_make(0x55, 0x55, 0x55), 0);
        lv_obj_set_style_shadow_color(id(va_sphere_outer), lv_color_make(0x88, 0x88, 0x88), 0);
        lv_obj_set_style_shadow_width(id(va_sphere_outer), 15, 0);
    - lvgl.label.update:
        id: va_status_label
        text: "Idle"
  on_client_connected:
    - lvgl.widget.hide: va_connection_label
    - lvgl.label.update:
        id: va_status_label
        text: "Idle"
  on_client_disconnected:
    - lambda: 'id(va_is_pulsing) = false;'
    - lvgl.widget.show: va_connection_label
    - lvgl.label.update:
        id: va_status_label
        text: "Disconnected"
