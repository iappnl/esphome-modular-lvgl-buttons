---
# Voice Assistant full-screen page
# Shows microphone status and provides a tap-to-talk button.
# Designed for use with hardware/media_player-voice_assistant.yaml.

globals:
  - id: va_is_pulsing
    type: bool
    initial_value: 'false'

script:
  - id: va_pulse_script
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return id(va_is_pulsing);'
          then:
            - lambda: |-
                int size = 160 + (rand() % 120);  // 160–280px random pulse
                lv_obj_set_width(id(va_mic_button), size);
                lv_obj_set_height(id(va_mic_button), size);
                lv_obj_set_style_radius(id(va_mic_button), size / 2, 0);
                lv_obj_align(id(va_mic_button), LV_ALIGN_CENTER, 0, 0);
            - delay: !lambda 'return 80 + (rand() % 350);'
      # Restore original size when pulsing stops
      - lambda: |-
          lv_obj_set_width(id(va_mic_button), 220);
          lv_obj_set_height(id(va_mic_button), 220);
          lv_obj_set_style_radius(id(va_mic_button), 110, 0);
          lv_obj_align(id(va_mic_button), LV_ALIGN_CENTER, 0, 0);

lvgl:
  pages:
    - id: main_page
      bg_color: black
      widgets:
        # Circular mic button — centred on screen, pulses when active
        - button:
            id: va_mic_button
            align: CENTER
            y: 0
            width: 220
            height: 220
            radius: 110
            bg_color: very_dark_gray
            shadow_opa: transp
            border_opa: transp
            pad_all: 0
            on_click:
              - if:
                  condition:
                    - voice_assistant.is_running:
                  then:
                    - voice_assistant.stop:
                  else:
                    - voice_assistant.start:
            widgets:
              - label:
                  id: va_mic_icon
                  align: CENTER
                  text: $mdi_microphone
                  text_font: $icon_font
                  text_color: white

        # Status label just below the button
        - label:
            id: va_status_label
            align: CENTER
            y: 160
            text: "Idle"
            text_font: $text_font
            text_color: white

        # Shown only when HA is disconnected
        - label:
            id: va_connection_label
            align: BOTTOM_MID
            y: -40
            text: "Not connected to Home Assistant"
            text_font: $text_font
            text_color: gray
            hidden: true

# Extend voice_assistant callbacks to update the UI
voice_assistant:
  on_listening:
    - lambda: 'id(va_is_pulsing) = false;'
    - script.stop: va_pulse_script
    - lambda: |-
        lv_obj_set_width(id(va_mic_button), 220);
        lv_obj_set_height(id(va_mic_button), 220);
        lv_obj_set_style_radius(id(va_mic_button), 110, 0);
        lv_obj_align(id(va_mic_button), LV_ALIGN_CENTER, 0, 0);
    - lvgl.widget.update:
        id: va_mic_button
        bg_color: red
    - lvgl.label.update:
        id: va_status_label
        text: "Listening..."
  on_stt_vad_end:
    - lvgl.widget.update:
        id: va_mic_button
        bg_color: ep_blue
    - lvgl.label.update:
        id: va_status_label
        text: "Thinking..."
    - lambda: 'id(va_is_pulsing) = true;'
    - script.execute: va_pulse_script
  on_tts_start:
    - lvgl.widget.update:
        id: va_mic_button
        bg_color: ep_green
    - lvgl.label.update:
        id: va_status_label
        text: "Speaking..."
    - lambda: 'id(va_is_pulsing) = true;'
    - script.execute: va_pulse_script
  on_end:
    - lambda: 'id(va_is_pulsing) = false;'
    - lvgl.widget.update:
        id: va_mic_button
        bg_color: very_dark_gray
    - lvgl.label.update:
        id: va_status_label
        text: "Idle"
  on_error:
    - lambda: 'id(va_is_pulsing) = false;'
    - lvgl.widget.update:
        id: va_mic_button
        bg_color: ep_orange
    - lvgl.label.update:
        id: va_status_label
        text: "Error"
    - delay: 2s
    - lvgl.widget.update:
        id: va_mic_button
        bg_color: very_dark_gray
    - lvgl.label.update:
        id: va_status_label
        text: "Idle"
  on_client_connected:
    - lvgl.widget.hide: va_connection_label
    - lvgl.label.update:
        id: va_status_label
        text: "Idle"
  on_client_disconnected:
    - lambda: 'id(va_is_pulsing) = false;'
    - lvgl.widget.show: va_connection_label
    - lvgl.label.update:
        id: va_status_label
        text: "Disconnected"
