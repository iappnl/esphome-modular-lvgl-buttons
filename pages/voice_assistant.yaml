---
# Voice Assistant full-screen page
# Shows microphone status and provides a tap-to-talk button.
# Designed for use with hardware/media_player-voice_assistant.yaml.

globals:
  - id: va_is_pulsing
    type: bool
    initial_value: 'false'

script:
  - id: va_pulse_script
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return id(va_is_pulsing);'
          then:
            - lambda: |-
                int size = 190 + (rand() % 60);    // 190–250px
                int glow = 15  + (rand() % 35);    // 15–50px shadow spread
                lv_obj_set_width(id(va_mic_button), size);
                lv_obj_set_height(id(va_mic_button), size);
                lv_obj_set_style_radius(id(va_mic_button), size / 2, 0);
                lv_obj_set_style_shadow_width(id(va_mic_button), glow, 0);
                lv_obj_align(id(va_mic_button), LV_ALIGN_CENTER, 0, 0);
            - delay: !lambda 'return 20 + (rand() % 80);'
      # Restore on stop
      - lambda: |-
          lv_obj_set_width(id(va_mic_button), 220);
          lv_obj_set_height(id(va_mic_button), 220);
          lv_obj_set_style_radius(id(va_mic_button), 110, 0);
          lv_obj_set_style_shadow_width(id(va_mic_button), 0, 0);
          lv_obj_align(id(va_mic_button), LV_ALIGN_CENTER, 0, 0);

lvgl:
  pages:
    - id: main_page
      bg_color: black
      widgets:
        # Circular mic button — centred, gradient gives inner-glow sphere look
        - button:
            id: va_mic_button
            align: CENTER
            y: 0
            width: 220
            height: 220
            radius: 110
            # Vertical gradient: lighter centre-top → dark edge-bottom
            bg_color: 0x555555
            bg_grad_color: very_dark_gray
            bg_grad_dir: VER
            # Glow (shadow spreads outward — creates the sphere halo)
            shadow_color: gray
            shadow_width: 0
            shadow_opa: 80%
            shadow_spread: 8
            border_opa: transp
            pad_all: 0
            on_click:
              - if:
                  condition:
                    - voice_assistant.is_running:
                  then:
                    - voice_assistant.stop:
                  else:
                    - voice_assistant.start:
            widgets:
              - label:
                  id: va_mic_icon
                  align: CENTER
                  text: $mdi_microphone
                  text_font: $icon_font
                  text_color: white

        # Status label just below the button
        - label:
            id: va_status_label
            align: CENTER
            y: 160
            text: "Idle"
            text_font: $text_font
            text_color: white

        # Shown only when HA is disconnected
        - label:
            id: va_connection_label
            align: BOTTOM_MID
            y: -40
            text: "Not connected to Home Assistant"
            text_font: $text_font
            text_color: gray
            hidden: true

voice_assistant:
  on_listening:
    - lambda: 'id(va_is_pulsing) = false;'
    - script.stop: va_pulse_script
    - lambda: |-
        lv_obj_set_width(id(va_mic_button), 220);
        lv_obj_set_height(id(va_mic_button), 220);
        lv_obj_set_style_radius(id(va_mic_button), 110, 0);
        lv_obj_set_style_shadow_width(id(va_mic_button), 20, 0);
        lv_obj_align(id(va_mic_button), LV_ALIGN_CENTER, 0, 0);
    - lvgl.widget.update:
        id: va_mic_button
        bg_color: 0xFF6666
        bg_grad_color: red
        bg_grad_dir: VER
        shadow_color: red
    - lvgl.label.update:
        id: va_status_label
        text: "Listening..."
  on_stt_vad_end:
    - lvgl.widget.update:
        id: va_mic_button
        bg_color: 0x77AAFF
        bg_grad_color: ep_blue
        bg_grad_dir: VER
        shadow_color: ep_blue
    - lvgl.label.update:
        id: va_status_label
        text: "Thinking..."
    - lambda: 'id(va_is_pulsing) = true;'
    - script.execute: va_pulse_script
  on_tts_start:
    - lvgl.widget.update:
        id: va_mic_button
        bg_color: 0x77DD99
        bg_grad_color: ep_green
        bg_grad_dir: VER
        shadow_color: ep_green
    - lvgl.label.update:
        id: va_status_label
        text: "Speaking..."
    - lambda: 'id(va_is_pulsing) = true;'
    - script.execute: va_pulse_script
  on_end:
    - lambda: 'id(va_is_pulsing) = false;'
    - lvgl.widget.update:
        id: va_mic_button
        bg_color: 0x555555
        bg_grad_color: very_dark_gray
        bg_grad_dir: VER
        shadow_color: gray
    - lvgl.label.update:
        id: va_status_label
        text: "Idle"
  on_error:
    - lambda: 'id(va_is_pulsing) = false;'
    - lvgl.widget.update:
        id: va_mic_button
        bg_color: 0xFFAA55
        bg_grad_color: ep_orange
        bg_grad_dir: VER
        shadow_color: ep_orange
    - lvgl.label.update:
        id: va_status_label
        text: "Error"
    - delay: 2s
    - lvgl.widget.update:
        id: va_mic_button
        bg_color: 0x555555
        bg_grad_color: very_dark_gray
        bg_grad_dir: VER
        shadow_color: gray
    - lvgl.label.update:
        id: va_status_label
        text: "Idle"
  on_client_connected:
    - lvgl.widget.hide: va_connection_label
    - lvgl.label.update:
        id: va_status_label
        text: "Idle"
  on_client_disconnected:
    - lambda: 'id(va_is_pulsing) = false;'
    - lvgl.widget.show: va_connection_label
    - lvgl.label.update:
        id: va_status_label
        text: "Disconnected"
